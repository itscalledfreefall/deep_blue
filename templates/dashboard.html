<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep Blue - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="dashboard-page">
    <header>
        <div class="header-left">
            <h1>DEEP BLUE</h1>
            <span class="subtitle">Forklift Safety System</span>
        </div>
        <div class="header-right">
            <span id="status-fps" class="stat">-- FPS</span>
            <span id="status-relay" class="stat relay-off">CLEAR</span>
            <a href="/logout" class="btn-logout">Logout</a>
        </div>
    </header>

    <main>
        <div class="stream-container" id="stream-container">
            <img id="stream" src="/video_feed" alt="Live Stream">
            <canvas id="roi-canvas"></canvas>
        </div>

        <div class="controls">
            <button id="btn-draw" class="btn btn-primary">Draw Zone</button>
            <button id="btn-undo" class="btn" disabled>Undo</button>
            <button id="btn-save" class="btn btn-success" disabled>Save Zone</button>
            <button id="btn-clear" class="btn btn-danger">Clear Zone</button>
        </div>

        <div id="draw-hint" class="hint" style="display:none">
            Click on the video to add polygon vertices. Click Save Zone when done.
        </div>
    </main>

    <script src="/static/roi.js"></script>
</body>
</html>
