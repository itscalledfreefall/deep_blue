<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · Deep Blue</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="dashboard">
        <!-- Fault Banner -->
        <div id="fault-banner" class="fault-banner" style="display:none">
            <span id="fault-text"></span>
        </div>

        <!-- Header -->
        <header class="dash-header">
            <div class="flex items-center">
                <h1>Deep Blue</h1>
                <span class="header-sub">Monitoring</span>
            </div>

            <div class="status-bar">
                <div class="status-item">
                    <span class="status-lbl">State</span>
                    <span class="badge badge-state" id="status-state">IDLE</span>
                </div>
                <div class="status-item">
                    <span class="status-lbl">FPS</span>
                    <span class="status-val" id="status-fps">--</span>
                </div>
                <div class="status-item">
                    <span class="status-lbl">Relay</span>
                    <span class="badge badge-danger" id="status-relay">SAFE</span>
                </div>
                <div class="status-item">
                    <span class="status-lbl">YOLO</span>
                    <span class="badge badge-dim" id="status-yolo">SLEEP</span>
                </div>
                <div class="status-item">
                    <span class="status-lbl">WDG</span>
                    <span class="badge badge-safe" id="status-watchdog">OK</span>
                </div>
                <a href="/logout" class="btn-logout">Logout</a>
            </div>
        </header>

        <!-- Main -->
        <main class="dash-main">

            <!-- Video Panel -->
            <section class="video-panel" id="video-panel">
                <div class="stream-wrap" id="stream-wrap">
                    <img id="stream" src="/video_feed" alt="Live Feed">
                    <canvas id="roi-canvas"></canvas>
                </div>
                <div class="loader-overlay" id="loader">
                    <span class="loader-text">CONNECTING…</span>
                </div>
            </section>

            <!-- Sidebar Controls -->
            <aside class="sidebar">
                <!-- Zone List -->
                <div class="control-group" id="zone-list-panel">
                    <h3>Zones</h3>
                    <div id="zone-warnings" class="zone-warnings"></div>
                    <div id="zone-list" class="zone-list"></div>
                    <button id="btn-add-zone" class="btn btn-primary w-full">+ Add Zone</button>
                </div>

                <!-- Zone Editor (hidden by default) -->
                <div class="control-group" id="zone-editor" style="display:none">
                    <h3 id="editor-title">New Zone</h3>
                    <label class="label">Name</label>
                    <input id="zone-name" type="text" class="zone-input" placeholder="e.g. Loading Bay" maxlength="24">
                    <label class="label">Type</label>
                    <div id="zone-type-selector" class="zone-type-selector">
                        <button type="button" class="zone-type-btn selected" data-type="human">Human</button>
                        <button type="button" class="zone-type-btn" data-type="vehicle_road">Vehicle Road</button>
                    </div>
                    <label class="label">Color</label>
                    <div id="color-swatches" class="color-swatches"></div>
                    <div class="btn-row" style="margin-top:.5rem">
                        <button id="btn-undo" class="btn" disabled>Undo</button>
                        <button id="btn-cancel-zone" class="btn btn-danger">Cancel</button>
                    </div>
                    <button id="btn-save-zone" class="btn btn-success w-full" disabled>Save Zone</button>
                </div>

                <!-- Control Settings -->
                <div class="control-group" id="settings-panel">
                    <button type="button" id="settings-toggle" class="btn btn-primary w-full">Control Settings</button>
                    <div id="settings-body" class="settings-body" style="display:none">
                        <label class="label">Clearance delay (s) <span class="label-hint">(wait before checking pedestrians)</span></label>
                        <input id="cfg-clearance" type="number" class="zone-input" min="0" max="30" step="0.5">
                        <label class="label">Passage duration (s) <span class="label-hint">(how long relay stays on)</span></label>
                        <input id="cfg-passage" type="number" class="zone-input" min="1" max="120" step="0.5">
                        <label class="label">Cooldown (s) <span class="label-hint">(ignore re-triggers after passage)</span></label>
                        <input id="cfg-cooldown" type="number" class="zone-input" min="0.5" max="30" step="0.5">
                        <label class="label">Motion consecutive frames <span class="label-hint">(anti-flicker)</span></label>
                        <input id="cfg-motion-frames" type="number" class="zone-input" min="1" max="30" step="1">
                        <label class="label">Pedestrian clear frames <span class="label-hint">(confirm no person)</span></label>
                        <input id="cfg-ped-clear" type="number" class="zone-input" min="1" max="30" step="1">
                        <label class="label">Motion pixel min % <span class="label-hint">(ignore noise below this)</span></label>
                        <input id="cfg-motion-min" type="number" class="zone-input" min="0.5" max="50" step="0.5">
                        <label class="label">Motion pixel max % <span class="label-hint">(ignore sunlight/global above this)</span></label>
                        <input id="cfg-motion-max" type="number" class="zone-input" min="1" max="100" step="1">
                        <label class="label">Watchdog pulse interval (s)</label>
                        <input id="cfg-wd-interval" type="number" class="zone-input" min="0.1" max="600" step="0.1">
                        <button id="btn-save-settings" class="btn btn-success w-full" style="margin-top:.5rem">Save Settings</button>
                        <div id="settings-feedback" class="settings-feedback"></div>
                    </div>
                </div>

                <div class="control-group" style="margin-top:auto">
                    <div id="draw-hint" class="draw-hint">
                        <strong>EDIT MODE</strong><br>
                        Click on the video to place vertices.<br>
                        Minimum 3 points required.
                    </div>
                </div>
            </aside>

        </main>
    </div>

    <!-- Toast container -->
    <div id="toast-wrap" class="toast-wrap"></div>

    <script src="/static/roi.js"></script>
</body>

</html>
