<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş · Deep Blue</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="login-page">

    <div class="login-card">
        <div class="login-header">
            <h1>DEEP BLUE</h1>
            <p>Güvenlik Sistemi · Yetkili Erişim</p>
        </div>

        {% if error %}
        <div class="error-msg" role="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <label class="label" for="username">Operatör Kimliği</label>
            <input class="login-input" type="text" id="username" name="username" placeholder="Kimliğinizi girin…" required
                autofocus autocomplete="username">

            <label class="label" for="password">Şifre</label>
            <input class="login-input" type="password" id="password" name="password" placeholder="••••••••" required
                autocomplete="current-password">

            <button class="btn btn-primary login-submit" type="submit">
                Giriş Yap
            </button>
        </form>

        <div class="login-footer">
            Sistem: <span class="online">AKTİF</span> · v2.4
        </div>
    </div>

</body>

</html>
